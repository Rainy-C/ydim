name: Build Android ARM64 APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "lib/**"
      - "android/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/android-arm64.yml"

permissions:
  contents: read

concurrency:
  group: android-arm64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Flutter 3.44.4 · Android arm64-v8a
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: 取出源码
        uses: actions/checkout@v7

      - name: 配置 JDK 21 与 Gradle 缓存
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: 配置 Flutter 3.44.4
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: "3.44.4"
          cache: true
          cache-sdk: true

      - name: 检查构建环境
        run: |
          echo "[*] Flutter"
          flutter --version
          echo "[*] Java"
          java -version
          echo "[*] 磁盘"
          df -h .

      - name: 获取依赖
        run: flutter pub get

      - name: 编译 ARM64 Release APK
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: 上传 ARM64 APK
        uses: actions/upload-artifact@v7
        with:
          name: YDim-arm64-v8a-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          if-no-files-found: error
          retention-days: 7
